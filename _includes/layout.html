<!doctype html>
<html lang="en">
    <head>
        <title>{{ title }}</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="preload" href="/index.css" as="style" />
        <link href="/index.css" rel="stylesheet" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="preload" fetchpriority="high" as="image"  href="/images/portrait.jpg" type="image/webp">
        <link
            rel="preload"
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&display=swap"
            as="style"
            onload="this.onload=null;this.rel='stylesheet'"
        />
        <noscript>
            <link
                href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&display=swap"
                rel="stylesheet"
            />
        </noscript>
    </head>
    <body>
        <div class="min-h-screen flex flex-col">
            <header class="px-7 pt-8 md:px-16">
                <nav class="flex items-center justify-between text-[15px]">
                    <a
                        href="/"
                        class="hidden md:inline-block nav-link"
                        {% if page.url == "/" %}data-active="true" aria-current="page"{% endif %}
                        >Home</a
                    >
                    <div class="flex items-center gap-6 md:hidden">
                        <details class="mobile-menu relative">
                            <summary
                                class="flex size-9 cursor-pointer list-none items-center justify-center text-foreground"
                                aria-label="Open navigation"
                            >
                                <span class="mobile-menu-icon" aria-hidden></span>
                            </summary>
                            <div
                                class="absolute left-0 top-12 z-10 min-w-40 border border-gold/50 bg-background p-4 shadow-[0_18px_36px_-24px_oklch(0.2_0.05_250_/_0.45)]"
                            >
                                <a href="/" class="block py-2 nav-link">Home</a>
                                <a href="/about/" class="block py-2 nav-link"
                                    >About</a
                                >
                                <a href="/blog/" class="block py-2 nav-link"
                                    >Blog</a
                                >
                                <a href="/projects/" class="block py-2 nav-link"
                                    >Projects</a
                                >
                            </div>
                        </details>
                        <a
                            href="/"
                            class="font-serif text-4xl font-black leading-none text-foreground"
                            >Rivaldi Putra</a
                        >
                    </div>
                    <div class="hidden items-center gap-10 md:flex">
                        <a
                            href="/about/"
                            class="nav-link"
                            {% if page.url == "/about/" %}data-active="true" aria-current="page"{% endif %}
                            >About</a
                        >
                        <a
                            href="/blog/"
                            class="nav-link"
                            {% if page.url == "/blog/" %}data-active="true" aria-current="page"{% endif %}
                            >Blog</a
                        >
                        <a
                            href="/projects/"
                            class="nav-link"
                            {% if page.url == "/projects/" %}data-active="true" aria-current="page"{% endif %}
                            >Projects</a
                        >
                    </div>
                </nav>
                <div class="mt-4 h-px w-full bg-gold opacity-70" />
            </header>

            <main class="flex-1 px-7 py-10 md:px-16">{{ content }}</main>

            <footer class="px-7 pb-8 text-center md:px-16 md:text-left">
                <div class="flourish my-10 max-w-3xl mx-auto">
                    <span class="flourish-ornament" aria-hidden>༻❁✿❀༺</span>
                </div>
                <div class="h-px w-full bg-gold opacity-60 mb-4" />
                <p class="text-sm text-muted-foreground">
                    © 2026 Rivaldi Putra. All Rights Reserved.
                </p>
            </footer>
        </div>
    </body>
</html>
